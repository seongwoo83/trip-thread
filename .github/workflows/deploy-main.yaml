name: Deploy to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ECR_REGISTRY: 522966066536.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: wooniverse/trip-thread-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::522966066536:role/github-trip-thread-ecr-role
          aws-region: ap-northeast-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }} \
            -t trip-thread .

      - name: Tag Docker image
        run: |
          docker tag trip-thread:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker tag trip-thread:latest $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.run_number }}-${{ env.SHORT_SHA }}

      - name: Push Docker image
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.run_number }}-${{ env.SHORT_SHA }}

      - name: Deploy on EC2 (pull & restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/trip-thread

            # 1️⃣ ECR 로그인 (매 배포마다 수행 - 토큰 만료 방지)
            aws ecr get-login-password --region ap-northeast-2 \
              | docker login --username AWS --password-stdin 522966066536.dkr.ecr.ap-northeast-2.amazonaws.com

            # 2️⃣ 최신 이미지 pull + 강제 재생성
            docker compose pull
            docker compose up -d --force-recreate

            # 3️⃣ 정리 및 확인
            docker image prune -f
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.RunningFor}}\t{{.Ports}}"
